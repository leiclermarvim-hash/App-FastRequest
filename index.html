<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de pedidos - V15.04.5</title>
    <style>
        :root { 
            --blue-dark: #001a33; 
            --blue-main: #003366; 
            --accent: #21a366; 
            --danger: #d9534f;
            --bg: #e9ecef; 
            --card: #ffffff; 
            --text: #333;
            --zebra: #f1f5f9;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; color: var(--text); overflow-x: hidden; }
        .app { background: var(--card); width: 100%; max-width: 500px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; height: 96vh; position: relative; border: 1px solid #ddd; }

        header { background: var(--blue-dark); color: white; padding: 20px; text-align: center; flex-shrink: 0; border-bottom: 4px solid var(--accent); position: relative; }
        .btn-top { background: var(--danger); color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; position: absolute; right: 10px; top: 20px; }

        .tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #dee2e6; flex-shrink: 0; }
        .tab { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-weight: 700; font-size: 12px; color: #6c757d; text-transform: uppercase; }
        .tab.active { color: var(--blue-main); border-bottom: 3px solid var(--blue-main); background: #fff; }

        .content { padding: 12px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .page { display: none; flex-direction: column; gap: 12px; width: 100%; }
        .page.active { display: flex; }

        .form-section { background: #fcfcfc; border: 1px solid #eee; border-radius: 12px; padding: 12px; width: 100%; }
        .section-title { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; display: block; }

        label { font-weight: 700; font-size: 13px; color: var(--blue-main); display: block; margin-bottom: 4px; }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 10px; width: 100%; font-size: 16px; background: white; color: var(--text); }

        .material-box { border: 2px dashed #cbd5e0; padding: 12px; border-radius: 12px; background: #f1f5f9; position: relative; width: 100%; }
        .btn-add { background: var(--blue-main); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px; }
        .btn-add:disabled { background: #ccc; cursor: not-allowed; }

        .switch-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .list-item { display: grid; grid-template-columns: auto 1fr auto 35px; gap: 10px; align-items: center; margin-bottom: 2px; padding: 10px; border-radius: 4px; font-size: 12px; border-bottom: 1px solid #eee; }
        .list-item:nth-child(even), .hist-table tr:nth-child(even), .base-table tr:nth-child(even) { background-color: var(--zebra); }

        .history-card { background: #fff; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        .btn-del-card { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 16px; cursor: pointer; color: var(--danger); }

        .hist-table, .base-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .hist-table th, .hist-table td, .base-table th, .base-table td { padding: 10px 8px; border-bottom: 1px solid #eee; text-align: left; }

        .hist-actions { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-hist { flex: 1; min-width: 70px; padding: 10px 2px; border: none; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold; color: white; }
        .btn-h-wa { background: #25D366; } .btn-h-edit { background: #f0ad4e; } .btn-h-done { background: var(--accent); } .btn-h-print { background: #6c757d; }

        footer { padding: 10px 15px; background: #fff; border-top: 1px solid #eee; text-align: center; flex-shrink: 0; }
        .btn-confirm { background: #ccc; color: #fff; border: none; padding: 16px; width: 100%; font-weight: 800; border-radius: 12px; cursor: not-allowed; font-size: 16px; }
        .btn-confirm.active { background: var(--accent); cursor: pointer; }

        .search-results { position: absolute; background: white; width: 100%; left: 0; z-index: 999; border: 1px solid #ccc; display: none; max-height: 200px; overflow-y: auto; border-radius: 10px; }
        .condicional-fields { display: none; flex-direction: column; gap: 8px; margin-top: 12px; border-left: 3px solid var(--blue-main); padding-left: 10px; }

        @media print {
            body { background: white; padding: 0; color: #000; }
            .app { box-shadow: none; border: none; width: 100%; max-width: none; height: auto; display: block; }
            header, .tabs, footer, .btn-top, .material-box, .btn-del-card, .hist-actions, .btn-h-edit, .btn-h-wa, .btn-h-done { display: none !important; }
            .history-card { border: 1px solid #333; page-break-inside: avoid; margin-bottom: 20px; padding: 20px; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="app">
    <header>
        <strong>FAST REQUEST PRO</strong><br><small>Gestão de pedidos | V15.04.5</small>
        <button class="btn-top" onclick="confirmReset()">LIMPAR</button>
    </header>

    <div class="tabs">
        <div id="tab-request" class="tab active" onclick="switchTab('request')">📋 NOVO</div>
        <div id="tab-history" class="tab" onclick="switchTab('history')">📂 HISTÓRICO</div>
        <div id="tab-config" class="tab" onclick="switchTab('config')">⚙️ BASE</div>
    </div>

    <div class="content">
        <div id="page-request" class="page active" oninput="saveDraft()">
            <div class="form-section">
                <span class="section-title">👤 Identificação</span>
                <div style="margin-bottom:12px">
                    <label>Solicitante:</label>
                    <div style="display:flex; gap:5px">
                        <div style="flex:3; position:relative">
                            <input type="text" id="sol_nome" placeholder="Buscar..." onkeyup="searchData('sol')" autocomplete="off">
                            <div id="sol_results" class="search-results"></div>
                        </div>
                        <input type="text" id="sol_mat" readonly placeholder="Mat." style="flex:1.2; background:#f1f3f5; text-align:center;">
                    </div>
                </div>
                <div>
                    <label>Atendente:</label>
                    <div style="display:flex; gap:5px">
                        <div style="flex:3; position:relative">
                            <input type="text" id="ate_nome" placeholder="Buscar..." onkeyup="searchData('ate')" autocomplete="off">
                            <div id="ate_results" class="search-results"></div>
                        </div>
                        <input type="text" id="ate_mat" readonly placeholder="Mat." style="flex:1.2; background:#f1f3f5; text-align:center;">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <span class="section-title">🚧 Dados do Pedido</span>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:12px">
                    <div><label>Projeto ou OSM:</label><input type="text" id="projeto" oninput="this.value = this.value.toUpperCase()"></div>
                    <div><label>Saída Geral ADM?</label><select id="mat_adm"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
                </div>
                <div style="margin-bottom:12px"><label>Tipo de Movimentação:</label>
                    <select id="movimentacao">
                        <option value="Z61 - Saída de material">Z61 - Saída de material</option>
                        <option value="Estorno de material">Estorno de material</option>
                        <option value="Z6D - Devolução de sucata">Z6D - Devolução de sucata</option>
                    </select>
                </div>
                <div style="margin-bottom:12px"><label>Deseja informar a reserva?</label>
                    <select id="reserva" onchange="toggleCondicionalFields(); saveDraft()"><option value="Não">Não</option><option value="Sim">Sim</option></select>
                </div>
                <div id="campos_condicionais" class="condicional-fields">
                    <div><label>ID do fluxo:</label><input type="text" id="id_fluxo"></div>
                    <div><label>Reserva:?</label><input type="text" id="reserva_num"></div>
                </div>
            </div>

            <div class="material-box">
                <span class="section-title">📦 Seleção de Itens</span>
                <div style="position:relative"><input type="text" id="mat_busca" placeholder="Código ou descrição..." onkeyup="searchData('mat')" autocomplete="off"><div id="mat_results" class="search-results"></div></div>
                <div id="mat_desc" style="font-size:14px; color:#000; margin:8px 0; font-weight:bold;">Nenhum item selecionado</div>

                <div style="margin-bottom: 12px;">
                    <label>Este material é ADM?</label>
                    <select id="item_is_adm">
                        <option value="Não">Não</option>
                        <option value="Sim">Sim</option>
                    </select>
                </div>

                <div class="switch-container">
                    <span style="font-size: 13px; font-weight: bold; color: var(--blue-main);">É transformador?</span>
                    <label class="switch">
                        <input type="checkbox" id="is_trafo" onchange="toggleTrafoField()">
                        <span class="slider"></span>
                    </label>
                    <div id="trafo_input_div" style="display:none; flex:1">
                        <input type="number" id="trafo_serie" placeholder="Nº do Patrimônio" step="1">
                    </div>
                </div>

                <div style="display:flex; gap:8px; align-items:flex-end">
                    <div style="flex:1"><label>QTD:</label><input type="text" id="mat_qtd" value="1" oninput="formatQtd(this)"></div>
                    <button id="btn_add_mat" class="btn-add" style="flex:1.5" onclick="addItem()" disabled>ADICIONAR</button>
                </div>
            </div>
            <div id="lista_ui"></div>
        </div>

        <div id="page-history" class="page">
            <div style="display:flex; gap:8px; margin-bottom:10px;">
                <button onclick="window.print()" style="flex:2; padding:12px; background:var(--blue-main); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR LOTE</button>
                <button onclick="carregarHistoricoDaPlanilha()" style="flex:1; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🔄 ATUALIZAR</button>
            </div>
            <div id="loading_hist" style="display:none; text-align:center; padding:10px; color:var(--blue-main); font-weight:bold;">Sincronizando...</div>
            <div id="history_list"></div>
        </div>

        <div id="page-config" class="page">
            <div class="form-section">
                <span class="section-title">📊 Base de Dados</span>
                <button onclick="updateBaseFromGithub()" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; background:var(--blue-dark); color:white; border:none; font-weight:bold; cursor:pointer;">ATUALIZAR BASE</button>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table class="base-table" id="table-users">
                        <thead style="position: sticky; top: 0; background: var(--blue-main); color: white;">
                            <tr><th>NOME COMPLETO</th><th>MATRÍCULA</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <button id="btn_confirm" class="btn-confirm" onclick="confirmarPedido()">CONFIRMAR</button>
    </footer>
</div>

<script>
    let db = { users: [], mats: [] };
    let listaSolicitacao = [];
    let historico = [];

    const URL_PLANILHA_GAS = "https://script.google.com/macros/s/AKfycbzymTwXWBHI9l1UXezrjPkTXkLRVS-lVZ1F0h1kgFzwrKykaykT0UNtS1mElYscvNai/exec";    
    const GITHUB_USERS = "https://raw.githubusercontent.com/leiclermarvim-hash/URL_USUARIOS_GITHUB/refs/heads/main/URL_USUARIOS_GITHUB.csv";
    const GITHUB_MATS = "https://raw.githubusercontent.com/leiclermarvim-hash/URL_USUARIOS_GITHUB/refs/heads/main/URL_MATERIAIS_GITHUB.csv";

    // Fechar resultados de busca ao clicar fora
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-results') && !e.target.closest('input')) {
            document.querySelectorAll('.search-results').forEach(d => d.style.display = 'none');
        }
    });

    window.onload = () => {
        const h = localStorage.getItem('fast_request_history');
        if(h) historico = JSON.parse(h);
        const cachedDb = localStorage.getItem('fast_request_db');
        if(cachedDb) { db = JSON.parse(cachedDb); renderUsersTable(); }
        const draft = localStorage.getItem('fast_request_draft');
        if(draft) {
            const d = JSON.parse(draft);
            Object.keys(d).forEach(k => { if(document.getElementById(k) && k !== 'itens') document.getElementById(k).value = d[k]; });
            listaSolicitacao = d.itens || [];
            toggleCondicionalFields();
            renderList();
        }
        updateBaseFromGithub(true); 
        carregarHistoricoDaPlanilha();
        validarForm();
    };

    function formatQtd(el) {
        let val = el.value.replace(/[^\d.,]/g, '');
        val = val.replace(/\./g, ',');
        const partes = val.split(',');
        if (partes.length > 2) val = partes[0] + ',' + partes.slice(1).join('');
        el.value = val;
    }

    function toggleTrafoField() {
        const isChecked = document.getElementById('is_trafo').checked;
        document.getElementById('trafo_input_div').style.display = isChecked ? 'block' : 'none';
        if(!isChecked) document.getElementById('trafo_serie').value = "";
    }

    async function carregarHistoricoDaPlanilha() {
        const loading = document.getElementById('loading_hist');
        if(loading) loading.style.display = 'block';
        try {
            const response = await fetch(URL_PLANILHA_GAS);
            const dadosPlanilha = await response.json();
            if (dadosPlanilha && Array.isArray(dadosPlanilha)) {
                const pendentes = historico.filter(h => h.status === 'pendente');
                let novaLista = [...pendentes, ...dadosPlanilha];
                novaLista.sort((a, b) => {
                    const parseData = (str) => {
                        if(!str) return 0;
                        const [d, t] = str.split(' ');
                        const [dia, mes, ano] = d.split('/');
                        return new Date(`${ano}-${mes}-${dia}T${t || '00:00:00'}`).getTime();
                    };
                    return parseData(b.data) - parseData(a.data);
                });
                historico = novaLista;
                localStorage.setItem('fast_request_history', JSON.stringify(historico));
                renderHistory();
            }
        } catch (e) { console.error("Erro na sincronização:", e); } finally { if(loading) loading.style.display = 'none'; }
    }

    function switchTab(t) {
        document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('page-'+t).classList.add('active');
        document.querySelector('footer').style.display = (t === 'request') ? 'block' : 'none';
    }

    function toggleCondicionalFields() {
        const resExist = document.getElementById('reserva').value;
        document.getElementById('campos_condicionais').style.display = (resExist === "Sim") ? 'flex' : 'none';
    }

    function saveDraft() {
        const d = {
            sol_nome: document.getElementById('sol_nome').value, sol_mat: document.getElementById('sol_mat').value,
            ate_nome: document.getElementById('ate_nome').value, ate_mat: document.getElementById('ate_mat').value,
            projeto: document.getElementById('projeto').value, mat_adm: document.getElementById('mat_adm').value,
            reserva: document.getElementById('reserva').value, movimentacao: document.getElementById('movimentacao').value,
            id_fluxo: document.getElementById('id_fluxo').value, reserva_num: document.getElementById('reserva_num').value,
            itens: listaSolicitacao
        };
        localStorage.setItem('fast_request_draft', JSON.stringify(d));
        validarForm();
    }

    function searchData(mode) {
        const input = document.getElementById(mode === 'mat' ? 'mat_busca' : mode + '_nome');
        const resDiv = document.getElementById(mode + '_results');
        const t = input.value.toUpperCase();
        if (t.length < 2) { resDiv.style.display = 'none'; return; }
        let f = (mode === 'mat') ? db.mats.filter(m => m.cod.includes(t) || m.desc.includes(t)) : db.users.filter(u => u.nome.includes(t));
        resDiv.innerHTML = f.slice(0, 8).map(x => `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="selectItem('${mode}','${(x.nome || x.cod).replace(/'/g, "\\'")}','${(x.mat || x.desc).replace(/'/g, "\\")}')"><b>${x.nome || x.cod}</b><br><small>${x.mat || x.desc}</small></div>`).join('');
        resDiv.style.display = f.length ? 'block' : 'none';
    }

    function selectItem(m, v1, v2) {
        if (m === 'mat') { document.getElementById('mat_busca').value = v1; document.getElementById('mat_desc').innerText = v2; document.getElementById('btn_add_mat').disabled = false; }
        else { document.getElementById(m + '_nome').value = v1; document.getElementById(m + '_mat').value = v2; }
        document.querySelectorAll('.search-results').forEach(d => d.style.display = 'none');
        saveDraft();
    }

    function addItem() {
        const cod = document.getElementById('mat_busca').value.trim();
        const descOriginal = document.getElementById('mat_desc').innerText;
        const qtdRaw = document.getElementById('mat_qtd').value;
        const isTrafo = document.getElementById('is_trafo').checked;
        const numSerie = document.getElementById('trafo_serie').value;
        const itemAdm = document.getElementById('item_is_adm').value;

        // Validação de quantidade
        if (!qtdRaw || qtdRaw === "0" || qtdRaw === "0,0") {
            alert("Informe uma quantidade válida.");
            return;
        }

        const duplicado = listaSolicitacao.some(item => item.cod === cod);
        if(duplicado) { alert("Este item já foi adicionado!"); return; }

        if (!cod) { alert("Selecione um material."); return; }
        const existe = db.mats.some(m => m.cod === cod);
        if (!existe) { alert("Código inexistente."); return; }

        let descFinal = descOriginal;
        if(isTrafo && numSerie) { descFinal += ` (Patrimônio: ${numSerie})`; }

        listaSolicitacao.push({ cod, desc: descFinal, qtd: qtdRaw, adm: itemAdm });

        document.getElementById('mat_busca').value = ""; 
        document.getElementById('mat_desc').innerText = "Nenhum item selecionado";
        document.getElementById('is_trafo').checked = false;
        document.getElementById('trafo_serie').value = "";
        document.getElementById('mat_qtd').value = "1";
        document.getElementById('item_is_adm').value = "Não";
        toggleTrafoField();
        document.getElementById('btn_add_mat').disabled = true;
        renderList(); saveDraft();
    }

    function renderList() {
        document.getElementById('lista_ui').innerHTML = listaSolicitacao.map((item, i) => `
            <div class="list-item">
                <b>${item.cod}</b>
                <div>${item.desc} <br><small><b>ADM:</b> ${item.adm || 'Não'}</small></div>
                <div style="background:var(--blue-dark); color:white; padding:2px 6px; border-radius:4px;">${item.qtd}</div>
                <button onclick="removeItem(${i})" style="border:none; background:none; cursor:pointer;">🗑️</button>
            </div>`).reverse().join('');
    }

    function removeItem(i) { listaSolicitacao.splice(i, 1); renderList(); saveDraft(); }

    function validarForm() {
        const solValido = db.users.some(u => u.mat === document.getElementById('sol_mat').value);
        const ateValido = db.users.some(u => u.mat === document.getElementById('ate_mat').value);
        const ok = solValido && ateValido && listaSolicitacao.length > 0 && document.getElementById('projeto').value.trim() !== "";
        const btn = document.getElementById('btn_confirm');
        btn.disabled = !ok; btn.classList.toggle('active', ok);
    }

    function confirmarPedido() {
        if(!confirm("Salvar este pedido?")) return;
        const novo = { 
            data: new Date().toLocaleString('pt-BR'), 
            projeto: document.getElementById('projeto').value, solic: document.getElementById('sol_nome').value, sol_mat: document.getElementById('sol_mat').value, 
            atend: document.getElementById('ate_nome').value, atend_mat: document.getElementById('ate_mat').value, 
            reserva: document.getElementById('reserva').value, movim: document.getElementById('movimentacao').value, 
            mat_adm: document.getElementById('mat_adm').value, id_fluxo: document.getElementById('id_fluxo').value, reserva_num: document.getElementById('reserva_num').value, 
            itens: [...listaSolicitacao], status: 'pendente' 
        };
        historico.unshift(novo); 
        localStorage.setItem('fast_request_history', JSON.stringify(historico));
        localStorage.removeItem('fast_request_draft');
        listaSolicitacao = []; document.getElementById('projeto').value = "";
        renderHistory(); renderList(); validarForm();
        switchTab('history');
    }

    function renderHistory() {
        document.getElementById('history_list').innerHTML = historico.map((h, index) => `
            <div class="history-card">
                <button class="btn-del-card" onclick="deleteCard(${index})">🗑️</button>
                <div style="font-size:12px; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px;">
                    <span style="color: var(--accent); font-weight: bold;"># ${h.status === 'efetivado' ? 'LANÇADO' : 'PENDENTE'}</span><br>
                    🕒 <b>Data:</b> ${h.data} <br>
                    🏗️ <b>Projeto:</b> <span style="color:var(--blue-main); font-weight:bold;">${h.projeto}</span>
                </div>
                <div style="font-size:11px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:8px;">
                    <div><label style="font-size:10px; margin:0;">SOLICITANTE:</label><div>${h.solic} <br> <small>(Mat: ${h.sol_mat})</small></div></div>
                    <div><label style="font-size:10px; margin:0;">ATENDENTE:</label><div>${h.atend} <br> <small>(Mat: ${h.atend_mat || h.ate_mat || '---'})</small></div></div>
                </div>
                <div style="font-size:10px; color:#444; background:#f1f5f9; padding:8px; border-radius:8px; margin-bottom:8px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <div><b>Mov:</b> ${h.movim}</div><div><b>Geral ADM:</b> ${h.mat_adm}</div>
                    <div><b>Reserva:</b> ${h.reserva_num || 'N/A'}</div><div><b>ID Fluxo:</b> ${h.id_fluxo || 'N/A'}</div>
                </div>
                <table class="hist-table">
                    <thead><tr style="background:#dee2e6"><th style="width:25%">Cod</th><th>Descrição / ADM</th><th style="width:15%">Qtd</th></tr></thead>
                    <tbody>${h.itens.map(it => `
                        <tr>
                            <td>${it.cod}</td>
                            <td>
                                ${it.desc} 
                                ${it.adm === 'Sim' ? '<br><span style="color:#d97706; font-weight:bold; font-size:9px;">⚠️ ITEM ADM</span>' : ''}
                            </td>
                            <td style="text-align:center"><b>${it.qtd}</b></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div class="hist-actions">
                    <button class="btn-hist btn-h-wa" onclick="reutilizarWA(${index})">WhatsApp</button>
                    <button class="btn-hist btn-h-edit" onclick="editarPedido(${index})">Editar</button>
                    <button class="btn-hist btn-h-done" onclick="efetivarPedido(${index}, this)">${h.status === 'efetivado' ? '✅ Sincronizado' : 'Salvar na Planilha'}</button>
                    <button class="btn-hist btn-h-print" onclick="printCard(${index})">Imprimir</button>
                </div>
            </div>`).join('');
    }

    async function efetivarPedido(index, btn) {
        const h = historico[index];
        if(h.status === 'efetivado') return;
        btn.innerText = "⏳..."; btn.disabled = true;
        const payloads = h.itens.map(item => {
            let qtdFinal = parseFloat(item.qtd.toString().replace(',', '.'));
            const mov = h.movim.toUpperCase();
            if (mov.includes("ESTORNO")) qtdFinal = qtdFinal * -1;

            let descPlanilha = item.desc;
            if (item.adm === "Sim") {
                descPlanilha += " (MATERIAL ADM)";
            }

            return {
                data: h.data, osm: h.projeto, solicitante: h.solic, sol_mat: h.sol_mat,
                atendente: h.atend, ate_mat: h.atend_mat || h.ate_mat,
                reserva: h.reserva, movimentacao: h.movim, item_cod: item.cod, 
                item_desc: descPlanilha, 
                item_qtd: qtdFinal, 
                mat_adm: item.adm || "Não", 
                id_fluxo: h.id_fluxo || "", reserva_num: h.reserva_num || ""
            };
        });
        try {
            await fetch(URL_PLANILHA_GAS, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payloads) });
            historico.splice(index, 1);
            localStorage.setItem('fast_request_history', JSON.stringify(historico));
            alert("Pedido enviado!");
            await carregarHistoricoDaPlanilha();
        } catch (err) { alert("Erro ao conectar."); btn.innerText = "Salvar"; btn.disabled = false; }
    }

    function deleteCard(index) {
        if(confirm("Remover este item do histórico do celular?")) { historico.splice(index, 1); localStorage.setItem('fast_request_history', JSON.stringify(historico)); renderHistory(); }
    }

    function editarPedido(index) {
        const h = historico[index];
        if(!confirm("Deseja carregar este pedido para edição? Ele será removido do histórico.")) return;

        document.getElementById('sol_nome').value = h.solic; 
        document.getElementById('sol_mat').value = h.sol_mat;
        document.getElementById('ate_nome').value = h.atend; 
        document.getElementById('ate_mat').value = h.atend_mat || h.ate_mat || "";
        document.getElementById('projeto').value = h.projeto; 
        document.getElementById('mat_adm').value = h.mat_adm;
        document.getElementById('reserva').value = h.reserva; 
        document.getElementById('movimentacao').value = h.movim;
        document.getElementById('id_fluxo').value = h.id_fluxo || ""; 
        document.getElementById('reserva_num').value = h.reserva_num || "";

        listaSolicitacao = [...h.itens];
        historico.splice(index, 1);
        localStorage.setItem('fast_request_history', JSON.stringify(historico));

        toggleCondicionalFields();
        renderList();
        renderHistory();
        validarForm();
        switchTab('request'); 
        saveDraft(); 
    }

    function reutilizarWA(index) {
        const h = historico[index];
        let msg = `*NOVA SOLICITAÇÃO*%0A%0A`;
        msg += `*SOLICITANTE:* ${h.solic}%0A`;
        msg += `*MATRÍCULA:* ${h.sol_mat}%0A`;
        msg += `*ATENDENTE:* ${h.atend}%0A`;
        msg += `*MATRÍCULA:* ${h.atend_mat || h.ate_mat || ''}%0A%0A`;
        msg += `*OSM:* ${h.projeto}%0A`;
        msg += `*ACRÉSCIMO?* ${h.reserva}%0A`; 
        msg += `*MOVIMENTAÇÃO:* ${h.movim}%0A`;
        msg += `*RESERVA:* ${h.reserva_num || 'N/A'}%0A`;
        msg += `*FLUXO:* ${h.id_fluxo || 'N/A'}%0A%0A`;
        msg += `*LISTA DE ITENS*%0A`;

        msg += h.itens.map(m => {
            const tagAdm = m.adm === "Sim" ? " *(ADM)*" : "";
            return `${m.cod} - ${m.desc}${tagAdm} - ${m.qtd}`;
        }).join('%0A');

        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function printCard(index) {
        const cards = document.querySelectorAll('.history-card');
        cards.forEach((c, i) => { if(i !== index) c.style.display = 'none'; });
        window.print();
        cards.forEach(c => c.style.display = 'block');
    }

    async function updateBaseFromGithub(silent = false) {
        try {
            const timestamp = new Date().getTime();
            const [resU, resM] = await Promise.all([
                fetch(`${GITHUB_USERS}?t=${timestamp}`), 
                fetch(`${GITHUB_MATS}?t=${timestamp}`)
            ]);
            const textU = await resU.text(), textM = await resM.text();
            db.users = textU.split('\n').slice(1).map(r => { const c = r.split(';'); return c.length >= 2 ? { nome: c[0].trim().toUpperCase(), mat: c[1].trim() } : null; }).filter(x => x);
            db.mats = textM.split('\n').slice(1).map(r => { const c = r.split(';'); return c.length >= 2 ? { cod: c[0].trim(), desc: (c[1] || "").trim().toUpperCase() } : null; }).filter(x => x);
            localStorage.setItem('fast_request_db', JSON.stringify(db));
            renderUsersTable();
            if(!silent) alert("Base atualizada com sucesso!");
        } catch (err) { if(!silent) alert("Erro ao conectar com a base do GitHub."); }
    }

    function renderUsersTable() {
        const tbody = document.querySelector('#table-users tbody');
        if(tbody) tbody.innerHTML = (db.users || []).map(u => `<tr><td>${u.nome}</td><td>${u.mat}</td></tr>`).join('');
    }

    function confirmReset() { if(confirm("Limpar formulário?")) { localStorage.removeItem('fast_request_draft'); location.reload(); } }
</script>
</body>
